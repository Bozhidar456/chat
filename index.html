<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тайният Чат на Императора</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #login-screen { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; }
        input[type="password"], input[type="text"] { padding: 10px; width: 80%; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        button { padding: 10px 20px; background-color: #0084ff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #006bce; }
        #error-msg { color: red; display: none; margin-top: 10px; }
        #chat-screen { display: none; width: 100%; max-width: 500px; background: white; height: 90vh; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); flex-direction: column; }
        #chat-header { background-color: #0084ff; color: white; padding: 15px; border-radius: 10px 10px 0 0; display: flex; justify-content: space-between; align-items: center; }
        
        /* Стил за бутоните в хедъра */
        .header-buttons { display: flex; gap: 5px; }
        #chat-header button { background-color: white; color: #0084ff; padding: 5px 10px; font-size: 14px; }
        #clear-btn { background-color: #ff4b4b !important; color: white !important; display: none; } /* Скрит по подразбиране */

        #chat-box { flex: 1; padding: 15px; overflow-y: auto; background-color: #e5ddd5; display: flex; flex-direction: column; gap: 10px; }
        #chat-input-area { display: flex; padding: 10px; border-top: 1px solid #ccc; background: white; border-radius: 0 0 10px 10px; align-items: center; }
        #chat-input-area input { flex: 1; margin-bottom: 0; border-radius: 20px; padding: 10px 15px; }
        #chat-input-area button { margin-left: 5px; border-radius: 20px; }
        
        /* Стил за бутона за снимка */
        #img-btn { background: #25D366; font-size: 20px; padding: 5px 12px; margin-right: 5px; }

        .message { max-width: 80%; padding: 8px 12px; border-radius: 15px; background-color: white; box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: relative; }
        .message.my-message { align-self: flex-end; background-color: #dcf8c6; }
        .message.other-message { align-self: flex-start; }
        .msg-header { font-size: 11px; font-weight: bold; margin-bottom: 3px; color: #555; }
        .msg-text { font-size: 15px; word-wrap: break-word; }
        
        /* Стил за снимките в чата */
        .chat-img { max-width: 100%; border-radius: 10px; margin-top: 5px; display: block; cursor: pointer; }
    </style>
</head>
<body>

    <audio id="notif-sound" src="notification.mp3" preload="auto"></audio>
    
    <div id="login-screen">
        <h2>Вход в Чата</h2>
        <input type="text" id="password-input" placeholder="Напиши си името (напр. Аз)...">
        <br>
        <button onclick="login()">Влез</button>
        <p id="error-msg">Няма такъв потребител! Кой си ти?</p>
    </div>

    <div id="chat-screen">
        <div id="chat-header">
            <span id="welcome-text">Чат</span>
            <div class="header-buttons">
                <button id="clear-btn" onclick="clearChat()">Изчисти</button>
                <button onclick="logout()">Изход</button>
            </div>
        </div>
        <div id="chat-box"></div>
        <div id="chat-input-area">
            <input type="file" id="image-input" accept="image/*" style="display: none;" onchange="sendImage(this)">
            <button id="img-btn" onclick="document.getElementById('image-input').click()">📷</button>
            
            <input type="text" id="msg-input" placeholder="Напиши съобщение..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Прати</button>
        </div>
    </div>

    <script>
        // Твоята оригинална конфигурация
        const firebaseConfig = {
            apiKey: "AIzaSyCZkjCFDTr3XrJPlgpxlakCrBLt3RipqHw",
            authDomain: "moyat-chat.firebaseapp.com",
            databaseURL: "https://moyat-chat-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "moyat-chat",
            storageBucket: "moyat-chat.firebasestorage.app",
            messagingSenderId: "677706748723",
            appId: "1:677706748723:web:bac8a6b548c7e368ee6446"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Твоите оригинални потребители
        const users = {
            "Аз": { name: "Императорът", icon: "👑" },
            "Матео": { name: "Матео", icon: "🤡" },
            "Чочко": { name: "Чочко", icon: "😍" },
            "Гешата": { name: "Гешата", icon: "💪🏿" },
            "Вили": { name: "Вили", icon: "💩" },
            "Ганчо": { name: "Ганчо", icon: "🍔" },
            "Крис": { name: "Крис", icon: "✈" },
            "Ники": { name: "Ники", icon: "🦔" }
        };

        let currentUserKey = null;

        window.onload = () => {
            const savedUser = localStorage.getItem('chat_currentUser');
            if (savedUser && users[savedUser]) {
                currentUserKey = savedUser;
                showChat();
            }
        };

        function login() {
            const nameInput = document.getElementById('password-input').value.trim();
            if (users[nameInput]) {
                currentUserKey = nameInput;
                localStorage.setItem('chat_currentUser', currentUserKey);
                document.getElementById('error-msg').style.display = 'none';
                showChat();
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        function logout() {
            localStorage.removeItem('chat_currentUser');
            location.reload(); 
        }

        function showChat() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            document.getElementById('welcome-text').innerHTML = `${users[currentUserKey].icon} ${users[currentUserKey].name}`;
            
            // Ако си "Аз", покажи бутона за изчистване
            if (currentUserKey === "Аз") {
                document.getElementById('clear-btn').style.display = 'block';
            }

            loadMessages();
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function sendMessage() {
            const textInput = document.getElementById('msg-input');
            const text = textInput.value.trim();
            if (!text) return;

            db.ref("messages").push({
                userKey: currentUserKey,
                text: text,
                isImage: false,
                timestamp: Date.now()
            });
            textInput.value = '';
        }

        // --- ФУНКЦИЯ ЗА ИЗПРАЩАНЕ НА СНИМКА ---
        function sendImage(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Image = e.target.result;
                db.ref("messages").push({
                    userKey: currentUserKey,
                    text: base64Image,
                    isImage: true,
                    timestamp: Date.now()
                });
            };
            reader.readAsDataURL(file);
            input.value = ""; 
        }

        // --- ФУНКЦИЯ ЗА ИЗЧИСТВАНЕ НА ЧАТА ---
        function clearChat() {
            if (confirm("Императоре, сигурен ли си, че искаш да изтриеш ВСИЧКИ съобщения?")) {
                db.ref("messages").remove();
            }
        }

        let isListening = false;
        function loadMessages() {
            if (isListening) return;
            isListening = true;

            document.getElementById('chat-box').innerHTML = '';
            const sound = document.getElementById('notif-sound');

            // Слушане за нови съобщения
            db.ref("messages").on("child_added", (snapshot) => {
                const msg = snapshot.val();
                renderSingleMessage(msg, snapshot.key);

                if (msg.userKey !== currentUserKey) {
                    sound.play().catch(e => console.log("Sound blocked"));
                }
            });

            // Слушане ако някой изтрие цялата база (за да изчезнат при всички онлайн)
            db.ref("messages").on("value", (snapshot) => {
                if (!snapshot.exists()) {
                    document.getElementById('chat-box').innerHTML = '';
                }
            });
        }

        function renderSingleMessage(msg, key) {
            const chatBox = document.getElementById('chat-box');
            const isMe = msg.userKey === currentUserKey;
            const user = users[msg.userKey] || { name: "Непознат", icon: "❓" };

            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isMe ? 'my-message' : 'other-message'}`;
            msgDiv.setAttribute('data-key', key);

            let content = "";
            if (msg.isImage) {
                content = `<img src="${msg.text}" class="chat-img" onclick="window.open(this.src)">`;
            } else {
                content = `<div class="msg-text">${msg.text}</div>`;
            }

            msgDiv.innerHTML = `
                <div class="msg-header">${user.icon} ${user.name}</div>
                ${content}
            `;
           
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
